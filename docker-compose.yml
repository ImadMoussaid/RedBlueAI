services:
  web:
    build:
      context: .
    ports:
      - "3000:3000"
    env_file:
      - .env.example
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - reports_data:/app/data/reports
      - evidence_data:/app/data/evidence

  worker:
    build:
      context: .
    command: ["npm", "run", "worker"]
    env_file:
      - .env.example
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
      - reports_data:/app/data/reports
      - evidence_data:/app/data/evidence

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: redblueai
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  reports_data:
  evidence_data:
  ollama_data:
